<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Ladies Salon</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#fff0f5;
}

/* Navbar */
nav{
background:#d63384;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* Hero */
.hero{
background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:120px 20px;
animation:fadeIn 2s ease;
}

.hero h1{
font-size:42px;
}

.hero button{
background:#ff69b4;
border:none;
padding:12px 25px;
color:white;
border-radius:25px;
cursor:pointer;
}

/* Sections */
.section{
padding:60px 20px;
text-align:center;
}

/* Services */
.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

/* Gallery */
.gallery{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

.gallery img{
width:300px;
height:300px;
object-fit:cover;
border-radius:12px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Footer */
footer{
background:#d63384;
color:white;
text-align:center;
padding:20px;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

/* Animation */
@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>Royal Ladies Salon</h1>
<p>Where Beauty Meets Elegance 💖</p>
<button onclick="window.location.href='https://wa.me/919876543210'">Book Appointment</button>
</div>

<div id="services" class="section">
<h2>Our Services</h2>

<div class="services">
<div class="card">Hair Cut & Styling</div>
<div class="card">Facial & Skin Care</div>
<div class="card">Bridal Makeup</div>
<div class="card">Manicure & Pedicure</div>
</div>
</div>

<div id="gallery" class="section">
<h2>Our Work</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<img src="https://images.unsplash.com/photo-1519415943484-9fa1873496d4">
<img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
</div>
</div>

<div id="contact" class="section">
<h2>Contact Us</h2>
<p>📞 +91 98765 43210</p>
<p>📍 Your Salon Address</p>
</div>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<footer>
© 2026 Royal Ladies Salon
</footer>

</body>
</html>
