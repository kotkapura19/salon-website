<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Ladies Salon</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#fff0f5;
}

/* NAVBAR */
nav{
background:#d63384;
padding:12px;
text-align:center;
position:sticky;
top:0;
}

nav a{
color:white;
margin:8px;
text-decoration:none;
font-size:14px;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:80px 15px;
}

.hero h1{
font-size:28px;
}

.hero button{
background:#ff69b4;
border:none;
padding:10px 20px;
color:white;
border-radius:20px;
}

/* SECTION */
.section{
padding:40px 15px;
text-align:center;
}

/* SERVICES */
.services{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

.card{
background:white;
padding:15px;
width:45%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* FORM */
form input, form textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* FOOTER */
footer{
background:#d63384;
color:white;
text-align:center;
padding:15px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
color:white;
padding:12px;
border-radius:50%;
}

/* DESKTOP */
@media(min-width:768px){
.hero h1{font-size:40px;}
.card{width:250px;}
.gallery{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>Luxury Ladies Salon</h1>
<p>Beauty • Elegance • Confidence 💖</p>
<button onclick="window.location.href='https://wa.me/919876543210'">Book Now</button>
</div>

<div id="services" class="section">
<h2>Our Services</h2>
<div class="services">
<div class="card">Hair Styling</div>
<div class="card">Facial</div>
<div class="card">Bridal Makeup</div>
<div class="card">Manicure</div>
</div>
</div>

<div id="gallery" class="section">
<h2>Our Work</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<img src="https://images.unsplash.com/photo-1519415943484-9fa1873496d4">
<img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
</div>
</div>

<div class="section">
<h2>Book Appointment</h2>

<form onsubmit="sendToWhatsApp(); return false;">
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="service" placeholder="Service" required>
<textarea id="msg" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>

</div>

<div id="contact" class="section">
<h2>Contact</h2>
<p>📞 +91 98765 43210</p>
<p>📍 Your Salon Address</p>

<iframe src="https://maps.google.com/maps?q=delhi&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="90%" height="200"></iframe>

</div>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<footer>
© 2026 Luxury Ladies Salon
</footer>

<script>
function sendToWhatsApp(){
var name=document.getElementById("name").value;
var service=document.getElementById("service").value;
var msg=document.getElementById("msg").value;

var url="https://wa.me/919876543210?text="
+"Name: "+name+"%0aService: "+service+"%0aMessage: "+msg;

window.open(url,'_blank');
}
</script>

</body>
</html>
